<!--学习 HTML CSS-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一个网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #eee;
        }

        input, button {
            padding: 6px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>信息收集表</h1>
    
    <!-- 表单部分 -->
    <form>
        <label>姓名：<input type="text" placeholder="输入姓名"></label><br>
        <label>邮箱：<input type="email" placeholder="输入邮箱"></label><br>
        <button type="submit">提交</button>
    </form>

    <!-- 表格部分 -->
    <h2>已提交列表</h2>
    <table>
        <tr>
            <th>姓名</th>
            <th>邮箱</th>
            <th>时间</th>
        </tr>
        <tr>
            <td>张三</td>
            <td>zhang@example.com</td>
            <td>2026-07-18</td>
        </tr>
        <tr>
            <td>李四</td>
            <td>li@example.com</td>
            <td>2026-07-17</td>
        </tr>
    </table>
</body>
</html>
